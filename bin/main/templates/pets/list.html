<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Quản lý thú cưng - Pet Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container py-4">
    <div th:if="${success}" class="alert alert-success alert-dismissible">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-heart"></i> Danh sách thú cưng</h2>
        <a th:href="@{/pets/new}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Thêm thú cưng</a>
    </div>
    <form th:action="@{/pets}" method="get" class="mb-3">
        <div class="input-group">
            <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Tìm thú cưng..."/>
            <button type="submit" class="btn btn-outline-primary">Tìm</button>
        </div>
    </form>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
            <tr>
                <th>Tên</th>
                <th>Loại</th>
                <th>Giống</th>
                <th>Giới tính</th>
                <th>Chủ</th>
                <th>Trạng thái</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="pet : ${pets}">
                <td th:text="${pet.name}">Tên</td>
                <td th:text="${pet.category.name}">Loại</td>
                <td th:text="${pet.breed != null ? pet.breed.name : '-'}">Giống</td>
                <td>
                    <span th:switch="${pet.gender?.name()}">
                        <span th:case="'MALE'">Đực</span>
                        <span th:case="'FEMALE'">Cái</span>
                        <span th:case="*">-</span>
                    </span>
                </td>
                <td th:text="${pet.owner.fullName}">Chủ</td>
                <td>
                    <span class="badge" th:classappend="${pet.status.name() == 'ACTIVE'} ? 'bg-success' : 'bg-secondary'" th:text="${pet.status.name() == 'ACTIVE' ? 'Đang nuôi' : pet.status.name()}">Trạng thái</span>
                </td>
                <td>
                    <a th:href="@{/pets/{id}/edit(id=${pet.id})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                    <form th:action="@{/pets/{id}/delete(id=${pet.id})}" method="post" class="d-inline" onsubmit="return confirm('Xóa thú cưng này?');">
                        <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(pets)}">
                <td colspan="7" class="text-center text-muted py-4">Chưa có thú cưng nào</td>
            </tr>
            </tbody>
        </table>
    </div>
    <nav th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/pets(keyword=${keyword}, page=${currentPage - 1})}">Trước</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/pets(keyword=${keyword}, page=${i})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/pets(keyword=${keyword}, page=${currentPage + 1})}">Sau</a>
            </li>
        </ul>
    </nav>
</div>

<footer class="bg-light text-center py-3 mt-5">
    <p class="mb-0 text-muted">&copy; 2025 Pet Management System</p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
