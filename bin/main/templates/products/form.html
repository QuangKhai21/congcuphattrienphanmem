<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${product.id != null} ? 'Sửa sản phẩm' : 'Thêm sản phẩm'">Sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container py-4">
    <h2 th:text="${product.id != null} ? 'Sửa sản phẩm' : 'Thêm sản phẩm mới'">Sản phẩm</h2>
    <form th:action="${product.id != null} ? @{/products/admin/{id}(id=${product.id})} : @{/products/admin}" th:object="${product}" method="post" class="mt-4">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">SKU *</label>
                <input type="text" th:field="*{sku}" class="form-control" required th:readonly="${product.id != null}"/>
                <div th:if="${#fields.hasErrors('sku')}" th:errors="*{sku}" class="text-danger small"></div>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Tên sản phẩm *</label>
                <input type="text" th:field="*{name}" class="form-control" required/>
                <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger small"></div>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Danh mục *</label>
            <select name="categoryId" class="form-select" required>
                <option value="">-- Chọn danh mục --</option>
                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}" th:selected="${product.category != null and product.category.id == c.id}">DM</option>
            </select>
        </div>
        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label">Giá *</label>
                <input type="number" th:field="*{price}" class="form-control" step="0.01" required/>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">Giá khuyến mãi</label>
                <input type="number" th:field="*{salePrice}" class="form-control" step="0.01"/>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">Số lượng</label>
                <input type="number" th:field="*{stockQuantity}" class="form-control"/>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Đơn vị</label>
                <input type="text" th:field="*{unit}" class="form-control" placeholder="VD: cái, kg"/>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Trạng thái</label>
                <select th:field="*{status}" class="form-select">
                    <option value="ACTIVE">Đang bán</option>
                    <option value="INACTIVE">Ngừng bán</option>
                    <option value="OUT_OF_STOCK">Hết hàng</option>
                </select>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Mô tả</label>
            <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
        </div>
        <input type="hidden" th:field="*{id}" th:if="${product.id != null}"/>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-primary">Lưu</button>
        <a th:href="@{/products}" class="btn btn-secondary">Hủy</a>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
