# ============================================================
# DATABASE CONFIGURATION — Railway auto-injects DATABASE_URL
# Spring Boot 3 tự nhận driver MySQL từ protocol mysql:// trong URL
# ============================================================
spring.datasource.url=${DATABASE_URL}

# ============================================================
# JPA / Hibernate — MySQL dialect for Railway
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console tắt trên production
spring.h2.console.enabled=false

# Production templates cache
spring.thymeleaf.cache=true

# Reverse proxy HTTPS (Railway)
server.forward-headers-strategy=framework

# ============================================================
# EMAIL — disabled by default on Railway (set EMAIL_ENABLED=true + SMTP vars if needed)
# ============================================================
app.email.enabled=${EMAIL_ENABLED:false}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-from=${MAIL_FROM:noreply@petclinic.com}

# ============================================================
# GOOGLE OAUTH2 LOGIN — bật khi có GOOGLE_OAUTH_CLIENT_ID trên Railway
# Nếu biến này rỗng thì OAuth2 bị disabled hoàn toàn
# ============================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=email

# ============================================================
# APPLICATION BASE URL (for email links)
# ============================================================
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ============================================================
# NEKOMIMI AI — disabled by default (set AI_ENABLED=true + OPENROUTER_API_KEY if needed)
# ============================================================
ai.openrouter.api-key=${OPENROUTER_API_KEY:}
ai.model=${AI_MODEL:google/gemini-2.0-flash-001}
ai.openrouter.endpoint=https://openrouter.ai/api/v1/chat/completions
ai.enabled=${AI_ENABLED:false}

# ============================================================
# HEALTH ENDPOINT
# ============================================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
