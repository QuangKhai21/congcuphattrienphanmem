# Application
spring.application.name=Pet Management System

# Server (Railway sets PORT)
server.port=${PORT:${SERVER_PORT:8080}}
server.servlet.context-path=/

# ============================================================
# DATABASE CONFIGURATION
# ============================================================
# Development: H2 (local file) — default khi không có biến DATABASE_URL
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./h2-data/petdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL}
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (development only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# Bật UTF-8
spring.messages.encoding=UTF-8
server.servlet.encoding.charset=UTF-8

# ============================================================
# EMAIL CONFIGURATION - GMAIL SMTP
# ============================================================
app.email.enabled=${EMAIL_ENABLED:false}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

spring.mail.default-from=${MAIL_FROM:noreply@petclinic.com}

# ============================================================
# APPLICATION BASE URL (for email links)
# ============================================================
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ============================================================
# NEKOMIMI AI CONFIGURATION
# ============================================================
ai.openrouter.api-key=${OPENROUTER_API_KEY:}
ai.model=${AI_MODEL:google/gemini-2.0-flash-001}
ai.openrouter.endpoint=https://openrouter.ai/api/v1/chat/completions
ai.enabled=${AI_ENABLED:false}

# ============================================================
# SECURITY: permit health check
# ============================================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
