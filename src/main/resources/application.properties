# Application
spring.application.name=Pet Management System

# Server (Railway sets PORT)
server.port=${PORT:${SERVER_PORT:8080}}
server.servlet.context-path=/

# ============================================================
# DATABASE CONFIGURATION
# ============================================================
# Development: H2 (local file)
spring.datasource.url=jdbc:h2:file:./h2-data/petdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Production: MySQL (Railway, etc.)
# Uncomment và cấu hình khi deploy:
# spring.datasource.url=${DATABASE_URL}
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (development only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# Bật UTF-8
spring.messages.encoding=UTF-8
server.servlet.encoding.charset=UTF-8

# ============================================================
# EMAIL CONFIGURATION - GMAIL SMTP
# ============================================================
app.email.enabled=${EMAIL_ENABLED:true}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

spring.mail.default-from=${MAIL_FROM:noreply@petclinic.com}

# ============================================================
# GOOGLE OAUTH2 LOGIN CONFIGURATION
# ============================================================
# Không để trống: Spring Boot 3 sẽ lỗi khi start. Đặt GOOGLE_OAUTH_* trên Railway để bật đăng nhập Google.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:disabled}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:disabled}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=email

# ============================================================
# APPLICATION BASE URL (for email links)
# ============================================================
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ============================================================
# NEKOMIMI AI CONFIGURATION
# ============================================================
ai.openrouter.api-key=${OPENROUTER_API_KEY:}
ai.model=${AI_MODEL:google/gemini-2.0-flash-001}
ai.openrouter.endpoint=https://openrouter.ai/api/v1/chat/completions
ai.enabled=${AI_ENABLED:true}
