# Profile "railway" — kích hoạt qua Dockerfile (ENV SPRING_PROFILES_ACTIVE=railway)
# Trên Railway: nối service MySQL với app và thêm biến tham chiếu MYSQLHOST, MYSQLPORT, MYSQLUSER, MYSQLPASSWORD, MYSQLDATABASE
# Hoặc đặt một biến SPRING_DATASOURCE_URL (JDBC đầy đủ) — sẽ ghi đè url/username/password bên dưới

# MySQL (Railway plugin — tên biến không có dấu gạch dưới)
# Railway thường dùng MYSQLHOST; một số template dùng MYSQL_HOST
spring.datasource.url=jdbc:mysql://${MYSQLHOST:${MYSQL_HOST}}:${MYSQLPORT:${MYSQL_PORT}}/${MYSQLDATABASE:${MYSQL_DATABASE}}?allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:${MYSQL_USER}}
spring.datasource.password=${MYSQLPASSWORD:${MYSQL_PASSWORD}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Tránh lỗi SMTP khi chưa cấu mail trên Railway
app.email.enabled=${EMAIL_ENABLED:false}

spring.h2.console.enabled=false

# Reverse proxy HTTPS (Railway)
server.forward-headers-strategy=framework

# Production templates
spring.thymeleaf.cache=true

# Public URL của app (đặt trong Railway Variables, ví dụ https://xxx.up.railway.app)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Health (Railway / kiểm tra nhanh)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
