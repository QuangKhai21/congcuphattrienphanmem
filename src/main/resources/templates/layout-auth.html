<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="auth-layout (pageTitle, pageContent, pageScripts)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <th:block th:replace="${pageTitle}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="theme-body" style="min-height:100vh;display:flex;flex-direction:column;">
<!-- 认证页使用极简顶栏，避免全站导航/聊天与 CSRF 会话问题 -->
<header class="auth-minimal-header">
    <div class="container py-2 d-flex align-items-center justify-content-center">
        <a class="site-logo text-decoration-none" th:href="@{/}">
            <span class="site-logo-a">P</span><span class="site-logo-rest">et Care</span>
        </a>
    </div>
</header>
<main class="flex-grow-1 container py-2">
<th:block th:replace="${pageContent}"/>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
<th:block th:replace="${pageScripts}" th:remove="tag"/>
</body>
</html>
