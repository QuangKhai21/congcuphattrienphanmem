<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::title}, ~{::#page-content}, ~{::#page-scripts})}">
<head>
    <title>Báo thất lạc - Pet Clinic</title>
</head>
<body>
<div id="page-content" th:fragment="content">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/lost-pets}">Tìm thú cưng</a></li>
            <li class="breadcrumb-item active">Báo thất lạc</li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Báo thú cưng thất lạc</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/lost-pets}" th:object="${report}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        
                        <div class="mb-3">
                            <label class="form-label">Chọn thú cưng <span class="text-danger">*</span></label>
                            <select name="petId" class="form-select" required>
                                <option value="">-- Chọn thú cưng --</option>
                                <option th:each="pet : ${pets}" th:value="${pet.id}" th:text="${pet.name}">
                                    Tên thú cưng
                                </option>
                            </select>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Ngày thất lạc <span class="text-danger">*</span></label>
                                <input type="datetime-local" th:field="*{lostDate}" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Số điện thoại liên hệ</label>
                                <input type="text" th:field="*{contactPhone}" class="form-control" 
                                       placeholder="0912 xxx xxx">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Địa điểm thất lạc <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{lastSeenLocation}" class="form-control" 
                                   placeholder="Ví dụ: Công viên Thống Nhất, Quận 10" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Vĩ độ (Lat)</label>
                                <input type="number" step="any" th:field="*{lastSeenLat}" class="form-control" 
                                       id="latInput" placeholder="10.8231">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Kinh độ (Lng)</label>
                                <input type="number" step="any" th:field="*{lastSeenLng}" class="form-control" 
                                       id="lngInput" placeholder="106.6297">
                            </div>
                        </div>
                        <div class="mb-3">
                            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="getLocation()">
                                <i class="bi bi-crosshair"></i> Lấy vị trí hiện tại
                            </button>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mô tả chi tiết</label>
                            <textarea th:field="*{description}" class="form-control" rows="3"
                                      placeholder="Màu lông, đặc điểm nhận dạng,..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phần thưởng (nếu có)</label>
                            <input type="text" th:field="*{reward}" class="form-control" 
                                   placeholder="Ví dụ: 500.000 VNĐ">
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" th:field="*{contactable}" class="form-check-input" checked>
                            <label class="form-check-label">Sẵn sàng nhận cuộc gọi</label>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg">
                                <i class="bi bi-send"></i> Gửi báo cáo
                            </button>
                            <a th:href="@{/lost-pets}" class="btn btn-secondary">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>

            <div class="alert alert-warning mt-3">
                <i class="bi bi-info-circle"></i>
                <strong>Lưu ý:</strong> Báo cáo sẽ được hiển thị công khai trên bản đồ để mọi người có thể giúp tìm kiếm.
            </div>
        </div>
    </div>
</div>

<th:block id="page-scripts" th:fragment="page-scripts">
    <script>
    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    document.getElementById('latInput').value = position.coords.latitude.toFixed(6);
                    document.getElementById('lngInput').value = position.coords.longitude.toFixed(6);
                },
                () => {
                    alert('Không thể lấy vị trí');
                }
            );
        } else {
            alert('Trình duyệt không hỗ trợ GPS');
        }
    }
    </script>
</th:block>
</body>
</html>
