<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${editMode} ? 'Sửa lịch hẹn' : 'Đặt lịch hẹn'">Đặt lịch hẹn - Pet Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/nav :: nav ('/appointments')}"></div>

<div class="container py-4" style="margin-bottom: 4rem;">
    <h2 th:text="${editMode} ? 'Sửa lịch hẹn' : 'Đặt lịch hẹn mới'">Đặt lịch hẹn mới</h2>

    <form th:action="${editMode} ? @{/appointments/{id}/edit(id=${appointment.id})} : @{/appointments}"
          th:object="${appointment}" method="post" class="mt-4">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="mb-3">
            <label class="form-label">Thú cưng *</label>
            <select name="petId" class="form-select" required>
                <option value="">-- Chọn thú cưng --</option>
                <option th:each="pet : ${pets}" th:value="${pet.id}"
                        th:selected="${appointment.pet != null and appointment.pet.id == pet.id}"
                        th:text="${pet.name + ' (' + (pet.category?.name ?: 'Chưa phân loại') + ')'}">Pet</option>
            </select>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Ngày *</label>
                <input type="date" name="date" class="form-control" required
                       th:min="${editMode ? '2000-01-01' : #temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"
                       th:value="${appointment.appointmentDate != null ? #temporals.format(appointment.appointmentDate, 'yyyy-MM-dd') : ''}"/>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Giờ *</label>
                <input type="time" name="time" class="form-control" required
                       th:value="${appointment.appointmentDate != null ? #temporals.format(appointment.appointmentDate, 'HH:mm') : ''}"/>
            </div>
        </div>
        <div class="mb-3" th:if="${editMode and isStaff}">
            <label class="form-label">Trạng thái</label>
            <select name="status" class="form-select">
                <option th:each="st : ${statuses}" th:value="${st.name()}"
                        th:selected="${appointment.status == st}"
                        th:text="${st.name()}">Trạng thái</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Loại dịch vụ</label>
            <select th:field="*{type}" class="form-select">
                <option value="CHECKUP">Khám tổng quát</option>
                <option value="VACCINATION">Tiêm phòng</option>
                <option value="GROOMING">Cắt tỉa lông</option>
                <option value="SURGERY">Phẫu thuật</option>
                <option value="DENTAL">Chăm sóc răng</option>
                <option value="OTHER">Khác</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Lý do / Triệu chứng</label>
            <input type="text" th:field="*{reason}" class="form-control" placeholder="VD: Khám định kỳ"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Ghi chú</label>
            <textarea th:field="*{notes}" class="form-control" rows="2"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" th:text="${editMode} ? 'Cập nhật' : 'Đặt lịch'">Đặt lịch</button>
        <a th:href="@{/appointments}" class="btn btn-secondary">Hủy</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
