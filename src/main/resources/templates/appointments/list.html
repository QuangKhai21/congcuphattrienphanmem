<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Lịch hẹn - Pet Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/nav :: nav ('/appointments')}"></div>

<div class="container py-4">
    <div th:if="${success}" class="alert alert-success alert-dismissible">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-calendar-check"></i> Lịch hẹn</h2>
        <a th:href="@{/appointments/new}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Đặt lịch mới</a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
            <tr>
                <th>Thú cưng</th>
                <th>Ngày giờ</th>
                <th>Loại</th>
                <th>Lý do</th>
                <th>Trạng thái</th>
                <th class="text-center">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="a : ${appointments}">
                <td th:text="${a.pet?.name ?: 'N/A'}">Tên thú cưng</td>
                <td th:text="${#temporals.format(a.appointmentDate, 'dd/MM/yyyy HH:mm')}">Ngày</td>
                <td>
                    <span th:switch="${a.type?.name()}">
                        <span th:case="'CHECKUP'">Khám tổng quát</span>
                        <span th:case="'VACCINATION'">Tiêm phòng</span>
                        <span th:case="'GROOMING'">Cắt tỉa lông</span>
                        <span th:case="'SURGERY'">Phẫu thuật</span>
                        <span th:case="'DENTAL'">Chăm sóc răng</span>
                        <span th:case="*" th:text="${a.type}">Loại</span>
                    </span>
                </td>
                <td th:text="${a.reason}">Lý do</td>
                <td>
                    <span class="badge bg-primary" th:if="${a.status?.name() == 'SCHEDULED'}">Đã đặt</span>
                    <span class="badge bg-success" th:if="${a.status?.name() == 'COMPLETED'}">Hoàn thành</span>
                    <span class="badge bg-warning" th:if="${a.status?.name() == 'CONFIRMED'}">Đã xác nhận</span>
                    <span class="badge bg-info" th:if="${a.status?.name() == 'IN_PROGRESS'}">Đang thực hiện</span>
                    <span class="badge bg-secondary" th:if="${a.status?.name() == 'CANCELLED' or a.status?.name() == 'NO_SHOW'}">Hủy</span>
                </td>
                <td class="text-center text-nowrap">
                    <a th:href="@{/appointments/{id}/edit(id=${a.id})}" class="btn btn-sm btn-outline-primary me-1"
                       th:if="${isStaff or (a.pet != null and a.pet.owner != null and #authentication.principal.user.id == a.pet.owner.id and a.status?.name() != 'COMPLETED' and a.status?.name() != 'CANCELLED' and a.status?.name() != 'NO_SHOW')}">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <form th:action="@{/appointments/{id}/delete(id=${a.id})}" method="post" class="d-inline"
                          th:if="${isStaff or (a.pet != null and a.pet.owner != null and #authentication.principal.user.id == a.pet.owner.id and a.status?.name() != 'COMPLETED' and a.status?.name() != 'CANCELLED' and a.status?.name() != 'NO_SHOW')}"
                          onsubmit="return confirm('Xóa lịch hẹn này?');">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(appointments)}">
                <td colspan="6" class="text-center text-muted py-4">Chưa có lịch hẹn nào</td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/appointments(page=${currentPage - 1})}">Trước</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/appointments(page=${i})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/appointments(page=${currentPage + 1})}">Sau</a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
