<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8"/>

    <title>Đặt lại mật khẩu - Pet Care</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>

    <link rel="stylesheet" th:href="@{/css/style.css}"/>

</head>

<body class="theme-body auth-page">

<div th:replace="~{fragments/nav :: nav ('/reset-password')}"></div>



<div class="container position-relative" style="z-index: 1060;">

    <nav class="auth-breadcrumb" aria-label="breadcrumb">

        <a th:href="@{/}">Trang chủ</a>

        <span class="mx-1">›</span>

        <span>Đặt lại mật khẩu</span>

    </nav>

    <div class="row justify-content-center py-4 pb-5">

        <div class="col-md-5 col-lg-4">

            <div class="card auth-card shadow-none">

                <div class="card-body">

                    <h1 class="auth-title text-center">Đặt lại mật khẩu</h1>

                    <p class="text-center text-muted small mb-4">Nhập mật khẩu mới cho tài khoản của bạn.</p>



                    <div th:if="${error}" class="alert alert-danger">

                        <i class="bi bi-exclamation-circle me-1"></i>

                        <span th:text="${error}"></span>

                    </div>



                    <form th:action="@{/reset-password}" method="post">

                        <input type="hidden" name="token" th:value="${token}"/>



                        <div class="mb-3">

                            <label class="form-label">Mật khẩu mới</label>

                            <div class="input-group">

                                <span class="input-group-text bg-white"><i class="bi bi-lock text-muted"></i></span>

                                <input type="password" name="password" id="password" class="form-control"

                                       placeholder="Tối thiểu 6 ký tự" minlength="6" required autofocus/>

                            </div>

                        </div>



                        <div class="mb-3">

                            <label class="form-label">Xác nhận mật khẩu mới</label>

                            <div class="input-group">

                                <span class="input-group-text bg-white"><i class="bi bi-lock-fill text-muted"></i></span>

                                <input type="password" name="confirmPassword" id="confirmPassword"

                                       class="form-control" placeholder="Nhập lại mật khẩu mới" minlength="6" required/>

                            </div>

                            <div class="form-text text-danger d-none" id="passwordMismatch">

                                <i class="bi bi-x-circle"></i> Mật khẩu không khớp

                            </div>

                        </div>



                        <div class="mb-3">

                            <div class="progress" style="height: 4px;">

                                <div class="progress-bar" id="passwordStrength" role="progressbar"

                                     style="width: 0%"></div>

                            </div>

                            <small class="form-text" id="passwordHint">Độ mạnh mật khẩu</small>

                        </div>



                        <button type="submit" id="submitBtn" class="btn btn-auth-submit" style="opacity: 0.65;" disabled>

                            <i class="bi bi-check-lg me-1"></i> Đặt lại mật khẩu

                        </button>

                    </form>



                    <hr class="my-4 opacity-25"/>

                    <p class="text-center mb-0">

                        <a th:href="@{/login}" class="auth-link-muted">

                            <i class="bi bi-arrow-left me-1"></i> Quay lại đăng nhập

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/main.js}"></script>

<script>

(function () {

    var password = document.getElementById('password');

    var confirm = document.getElementById('confirmPassword');

    var strengthBar = document.getElementById('passwordStrength');

    var strengthHint = document.getElementById('passwordHint');

    var mismatch = document.getElementById('passwordMismatch');

    var submitBtn = document.getElementById('submitBtn');



    function checkStrength(p) {

        var score = 0;

        if (p.length >= 6) score++;

        if (p.length >= 8) score++;

        if (/[A-Z]/.test(p)) score++;

        if (/[0-9]/.test(p)) score++;

        if (/[^A-Za-z0-9]/.test(p)) score++;

        return score;

    }



    function updateUI() {

        var val = password.value;

        var confirmVal = confirm.value;

        var score = checkStrength(val);



        var colors = ['bg-danger', 'bg-warning', 'bg-info', 'bg-success', 'bg-success'];

        var labels = ['Yếu', 'Trung bình', 'Khá', 'Mạnh', 'Rất mạnh'];



        strengthBar.className = 'progress-bar ' + colors[Math.min(score, 4)];

        strengthBar.style.width = (score * 20) + '%';

        strengthHint.textContent = val ? labels[Math.min(score, 4)] : 'Độ mạnh mật khẩu';

        strengthHint.className = 'form-text ' + (score >= 2 ? 'text-success' : 'text-muted');



        if (confirmVal && val !== confirmVal) {

            mismatch.classList.remove('d-none');

            submitBtn.disabled = true;

            submitBtn.style.opacity = '0.65';

        } else {

            mismatch.classList.add('d-none');

            var ok = val.length >= 6 && val === confirmVal;

            submitBtn.disabled = !ok;

            submitBtn.style.opacity = ok ? '1' : '0.65';

        }

    }



    password.addEventListener('input', updateUI);

    confirm.addEventListener('input', updateUI);

})();

</script>

</body>

</html>
