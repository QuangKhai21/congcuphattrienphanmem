<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8"/>

    <title>Quên mật khẩu - Pet Care</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>

    <link rel="stylesheet" th:href="@{/css/style.css}"/>

</head>

<body class="theme-body auth-page">

<div th:replace="~{fragments/nav :: nav ('/forgot-password')}"></div>



<div class="container position-relative" style="z-index: 1060;">

    <nav class="auth-breadcrumb" aria-label="breadcrumb">

        <a th:href="@{/}">Trang chủ</a>

        <span class="mx-1">›</span>

        <span>Quên mật khẩu</span>

    </nav>

    <div class="row justify-content-center py-4 pb-5">

        <div class="col-md-5 col-lg-4">

            <div class="card auth-card shadow-none">

                <div class="card-body">

                    <h1 class="auth-title text-center">Quên mật khẩu?</h1>

                    <p class="text-center text-muted small mb-4">Nhập email đã đăng ký, chúng tôi sẽ gửi liên kết đặt lại mật khẩu.</p>



                    <div th:if="${success}" class="alert alert-success">
                        <i class="bi bi-check-circle me-1"></i>
                        <span th:text="${success}"></span>
                    </div>

                    <div th:if="${error}" class="alert alert-danger">
                        <i class="bi bi-exclamation-circle me-1"></i>
                        <span th:text="${error}"></span>
                    </div>

                    <div th:if="${info}" class="alert alert-info">
                        <i class="bi bi-info-circle me-1"></i>
                        <span th:text="${info}"></span>
                    </div>

                    <form th:if="${success == null}" th:action="@{/forgot-password}" method="post">

                        <div class="mb-3">

                            <label class="form-label">Địa chỉ email</label>

                            <div class="input-group">

                                <span class="input-group-text bg-white border-end-0 rounded-start"><i class="bi bi-envelope text-muted"></i></span>

                                <input type="email" name="email" class="form-control border-start-0 rounded-end"

                                       placeholder="email@example.com" required autofocus/>

                            </div>

                        </div>

                        <button type="submit" class="btn btn-auth-submit">

                            <i class="bi bi-send me-1"></i> Gửi liên kết đặt lại

                        </button>

                    </form>



                    <hr class="my-4 opacity-25"/>

                    <p class="text-center mb-0">

                        <a th:href="@{/login}" class="auth-link-muted">

                            <i class="bi bi-arrow-left me-1"></i> Quay lại đăng nhập

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/main.js}"></script>

</body>

</html>
