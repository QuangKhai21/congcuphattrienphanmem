<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Chọn thú cưng - Báo cáo bệnh án</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/nav :: nav ('/reports')}"></div>

<div class="container py-4" style="margin-bottom: 4rem;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-file-earmark-medical text-danger"></i> Báo cáo hồ sơ bệnh án</h2>
        <a th:href="@{/reports}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Quay lại
        </a>
    </div>

    <p class="text-muted mb-4">Chọn thú cưng để xem báo cáo bệnh án:</p>

    <div class="row">
        <div class="col-md-6 mb-4" th:each="pet : ${pets}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="bi bi-github text-primary"></i>
                        <span th:text="${pet.name}">Tên thú cưng</span>
                    </h5>
                    <p class="text-muted small mb-1">
                        <i class="bi bi-person"></i> Chủ: <span th:text="${pet.owner?.fullName ?: 'N/A'}">Chủ nuôi</span>
                    </p>
                    <p class="text-muted small mb-2">
                        <i class="bi bi-tag"></i> <span th:text="${pet.category?.name ?: 'Chưa phân loại'}">Loài</span>
                        <span th:if="${pet.breed}" th:text="' - ' + ${pet.breed.name}"> - Giống</span>
                    </p>
                </div>
                <div class="card-footer bg-white">
                    <a th:href="@{/reports/medical-records/{petId}(petId=${pet.id})}"
                       class="btn btn-outline-danger btn-sm w-100">
                        <i class="bi bi-file-earmark-medical"></i> Xem báo cáo bệnh án
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center py-5 text-muted" th:if="${#lists.isEmpty(pets)}">
        <i class="bi bi-inbox fs-1 d-block mb-2"></i>
        <p>Không có thú cưng nào.</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
