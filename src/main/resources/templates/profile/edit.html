<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Chỉnh sửa thông tin - Pet Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .profile-avatar-sm {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #e9ecef;
        }
        .profile-avatar-placeholder-sm {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            font-weight: 700;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: nav ('/profile')}"></div>

<div class="container py-4" style="margin-bottom: 4rem;">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h4 class="mb-0"><i class="bi bi-pencil-square"></i> Chỉnh sửa thông tin</h4>
                    <a th:href="@{/profile}" class="btn btn-light btn-sm">
                        <i class="bi bi-arrow-left"></i> Quay lại
                    </a>
                </div>
                <div class="card-body">
                    <form th:action="@{/profile/edit}" method="post" enctype="multipart/form-data">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <!-- Avatar Upload -->
                        <div class="text-center mb-4">
                            <div class="d-inline-block position-relative" id="avatarPreviewContainer">
                                <div th:if="${user.avatarUrl != null and !#strings.isEmpty(user.avatarUrl)}"
                                     class="position-relative d-inline-block">
                                    <img th:src="@{${user.avatarUrl}}" class="profile-avatar-sm" alt="Avatar"
                                         id="avatarPreviewImg"
                                         onerror="this.style.display='none'; document.getElementById('avatarPlaceholder').style.display='flex';">
                                    <div id="avatarPlaceholder" class="profile-avatar-placeholder-sm" style="display:none;">
                                        <span th:text="${#strings.substring(user.fullName, 0, 1)}">U</span>
                                    </div>
                                </div>
                                <div th:unless="${user.avatarUrl != null and !#strings.isEmpty(user.avatarUrl)}"
                                     class="profile-avatar-placeholder-sm d-inline-flex" id="avatarPlaceholder">
                                    <span th:text="${#strings.substring(user.fullName, 0, 1)}">U</span>
                                </div>
                            </div>
                            <div class="mt-2">
                                <label for="avatarFile" class="btn btn-outline-secondary btn-sm">
                                    <i class="bi bi-camera"></i> Đổi ảnh đại diện
                                </label>
                                <input type="file" id="avatarFile" name="avatarFile" accept="image/*" class="d-none"
                                       onchange="previewAvatar(this);">
                                <small class="d-block text-muted mt-1">JPG, PNG, GIF — tối đa 5MB</small>
                            </div>
                        </div>

                        <!-- Personal Info -->
                        <h5 class="mb-3 border-bottom pb-2"><i class="bi bi-person"></i> Thông tin cá nhân</h5>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Tên đầy đủ <span class="text-danger">*</span></label>
                                <input type="text" name="fullName" class="form-control" required
                                       th:value="${user.fullName}" maxlength="100"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email <span class="text-danger">*</span></label>
                                <input type="email" name="email" class="form-control" required
                                       th:value="${user.email}" maxlength="150"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Số điện thoại</label>
                                <input type="text" name="phone" class="form-control"
                                       th:value="${user.phone ?: ''}" maxlength="20" placeholder="VD: 0901234567"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Địa chỉ</label>
                                <input type="text" name="address" class="form-control"
                                       th:value="${user.address ?: ''}" maxlength="500" placeholder="VD: 123 Đường ABC, TP.HCM"/>
                            </div>
                        </div>

                        <!-- Password Change -->
                        <h5 class="mb-3 mt-4 border-bottom pb-2"><i class="bi bi-lock"></i> Đổi mật khẩu</h5>
                        <p class="text-muted small">Bỏ trống nếu không muốn đổi mật khẩu.</p>
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label">Mật khẩu hiện tại</label>
                                <input type="password" name="currentPassword" class="form-control"
                                       autocomplete="current-password"/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Mật khẩu mới</label>
                                <input type="password" name="newPassword" class="form-control"
                                       autocomplete="new-password" minlength="6"/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Xác nhận mật khẩu mới</label>
                                <input type="password" name="confirmPassword" class="form-control"
                                       autocomplete="new-password"/>
                            </div>
                        </div>

                        <!-- Submit -->
                        <div class="mt-4 d-flex gap-2 justify-content-end">
                            <a th:href="@{/profile}" class="btn btn-secondary">Hủy</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> Lưu thay đổi
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function previewAvatar(input) {
    if (input.files && input.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            var img = document.getElementById('avatarPreviewImg');
            var ph = document.getElementById('avatarPlaceholder');
            if (!img) {
                img = document.createElement('img');
                img.id = 'avatarPreviewImg';
                img.className = 'profile-avatar-sm';
                img.alt = 'Avatar';
                if (ph) ph.style.display = 'none';
                var container = document.getElementById('avatarPreviewContainer');
                var first = container.firstElementChild;
                if (first) first.style.display = 'none';
                container.prepend(img);
            }
            img.src = e.target.result;
            img.style.display = 'flex';
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
