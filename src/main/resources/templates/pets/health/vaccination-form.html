<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="|Thêm lịch tiêm phòng - ${pet.name} - Pet Care|">Thêm lịch tiêm phòng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="theme-body">
<div th:replace="~{fragments/nav :: nav ('/pets')}"></div>

<main class="container py-4 site-main" style="margin-bottom: 4rem;">

    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/pets/{id}/vaccinations(id=${pet.id})}" class="btn btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="mb-0" th:text="|Thêm lịch tiêm phòng — ${pet.name}|">Thêm lịch tiêm phòng</h2>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-body py-3">
            <div class="row align-items-center">
                <th:block th:replace="~{fragments/pet-health-subpage :: asideAndInfo(${pet}, true)}"/>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="bi bi-shield-check"></i> Thêm lịch tiêm phòng</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/pets/{id}/vaccinations(id=${pet.id})}" th:object="${vaccination}" method="post">

                        <!-- Vaccine Name -->
                        <div class="mb-3">
                            <label class="form-label">Tên vaccine <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{vaccineName}" class="form-control" required
                                   placeholder="VD: Vaccine phòng dại, Vaccine 5 bệnh, ..."/>
                        </div>

                        <!-- Vaccine Type -->
                        <div class="mb-3">
                            <label class="form-label">Loại vaccine</label>
                            <select th:field="*{vaccineType}" class="form-select">
                                <option value="">-- Chọn loại vaccine --</option>
                                <option value="RABIES">Dại (Rabies)</option>
                                <option value="DHPP">Phòng 6 bệnh cho chó (DHPP)</option>
                                <option value="FVRCP">Phòng 4 bệnh cho mèo (FVRCP)</option>
                                <option value="BORDETELLA">Ho Kennel (Bordetella)</option>
                                <option value="LEPTOSPIROSIS">Leptospira</option>
                                <option value="CANINE_INFLUENZA">Cúm chó (Canine Influenza)</option>
                                <option value="LYME">Bệnh Lyme</option>
                                <option value="FELINE_LEUKEMIA">Leukemia mèo (FeLV)</option>
                                <option value="OTHER">Khác</option>
                            </select>
                        </div>

                        <!-- Vaccination Date -->
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Ngày tiêm <span class="text-danger">*</span></label>
                                    <input type="date" th:field="*{vaccinationDate}" class="form-control" required/>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Ngày nhắc lại</label>
                                    <input type="date" th:field="*{nextDueDate}" class="form-control"
                                           placeholder="Để trống nếu không có nhắc lại"/>
                                    <small class="text-muted">Để trống nếu không có lịch nhắc</small>
                                </div>
                            </div>
                        </div>

                        <!-- Manufacturer & Batch -->
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Nhà sản xuất</label>
                                    <input type="text" th:field="*{manufacturer}" class="form-control"
                                           placeholder="VD: Pfizer, Zoetis, ..."/>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Số lô</label>
                                    <input type="text" th:field="*{batchNumber}" class="form-control"
                                           placeholder="VD: LOT2024001"/>
                                </div>
                            </div>
                        </div>

                        <!-- Notes -->
                        <div class="mb-3">
                            <label class="form-label">Ghi chú</label>
                            <textarea th:field="*{notes}" class="form-control" rows="2"
                                      placeholder="Các ghi chú bổ sung (phản ứng sau tiêm, ... )"></textarea>
                        </div>

                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="d-flex justify-content-between flex-wrap gap-2">
                            <a th:href="@{/pets/{id}/vaccinations(id=${pet.id})}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Quay lại
                            </a>
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check-lg"></i> Lưu lịch tiêm
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
