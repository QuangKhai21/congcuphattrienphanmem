<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="|Thêm bản ghi cân nặng - ${pet.name} - Pet Care|">Thêm bản ghi cân nặng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="theme-body">
<div th:replace="~{fragments/nav :: nav ('/pets')}"></div>

<main class="container py-4 site-main" style="margin-bottom: 4rem;">

    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/pets/{id}/weight(id=${pet.id})}" class="btn btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="mb-0" th:text="|Thêm bản ghi cân nặng — ${pet.name}|">Thêm bản ghi cân nặng</h2>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-body py-3">
            <div class="row align-items-center">
                <th:block th:replace="~{fragments/pet-health-subpage :: asideAndInfo(${pet}, true)}"/>
            </div>
        </div>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-graph-up"></i> Thêm bản ghi cân nặng</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/pets/{id}/weight(id=${pet.id})}" th:object="${weightRecord}" method="post" novalidate>

                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger" role="alert">
                            <ul class="mb-0 ps-3">
                                <li th:each="e : ${#fields.errors('*')}" th:text="${e}">Lỗi</li>
                            </ul>
                        </div>

                        <!-- Weight -->
                        <div class="mb-3">
                            <label class="form-label" for="weight">Cân nặng (kg) <span class="text-danger">*</span></label>
                            <input id="weight" type="number" step="0.1" min="0" th:field="*{weight}"
                                   class="form-control" th:classappend="${#fields.hasErrors('weight')} ? ' is-invalid'"
                                   placeholder="VD: 5.5" required/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('weight')}" th:errors="*{weight}"></div>
                            <small class="text-muted">Dùng dấu chấm cho số thập phân (VD: 5.5)</small>
                        </div>

                        <!-- Date -->
                        <div class="mb-3">
                            <label class="form-label" for="recordDate">Ngày ghi nhận <span class="text-danger">*</span></label>
                            <input id="recordDate" type="date" th:field="*{recordDate}" class="form-control"
                                   th:classappend="${#fields.hasErrors('recordDate')} ? ' is-invalid'" required/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('recordDate')}" th:errors="*{recordDate}"></div>
                        </div>

                        <!-- Unit -->
                        <div class="mb-3">
                            <label class="form-label">Đơn vị</label>
                            <select th:field="*{unit}" class="form-select">
                                <option value="kg">Kilogram (kg)</option>
                                <option value="g">Gram (g)</option>
                                <option value="lb">Pound (lb)</option>
                            </select>
                        </div>

                        <!-- Notes -->
                        <div class="mb-3">
                            <label class="form-label">Ghi chú</label>
                            <textarea th:field="*{notes}" class="form-control" rows="2"
                                      placeholder="VD: Sau khi ăn, Buổi sáng, ..."></textarea>
                        </div>

                        <!-- Buttons -->
                        <div class="d-flex justify-content-between">
                            <a th:href="@{/pets/{id}/weight(id=${pet.id})}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Quay lại
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> Lưu bản ghi
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Set default date to today
    document.addEventListener('DOMContentLoaded', function() {
        const dateInput = document.querySelector('input[name="recordDate"]');
        if (dateInput && !dateInput.value) {
            dateInput.value = new Date().toISOString().split('T')[0];
        }
    });
</script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
