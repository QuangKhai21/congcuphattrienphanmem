<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="|Thêm hồ sơ bệnh án - ${pet.name} - Pet Care|">Thêm hồ sơ bệnh án</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="theme-body">
<div th:replace="~{fragments/nav :: nav ('/pets')}"></div>

<main class="container py-4 site-main" style="margin-bottom: 4rem;">

    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/pets/{id}/medical-records(id=${pet.id})}" class="btn btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="mb-0" th:text="|Thêm hồ sơ bệnh án — ${pet.name}|">Thêm hồ sơ bệnh án</h2>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-body py-3">
            <div class="row align-items-center">
                <th:block th:replace="~{fragments/pet-health-subpage :: asideAndInfo(${pet}, true)}"/>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0"><i class="bi bi-file-earmark-medical"></i> Thêm hồ sơ bệnh án</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/pets/{id}/medical-records(id=${pet.id})}" th:object="${record}" method="post">

                        <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

                        <div class="mb-3">
                            <label class="form-label">Chẩn đoán <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{diagnosis}" class="form-control" required
                                   placeholder="VD: Viêm da, Cảm lạnh, ..."/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Triệu chứng</label>
                            <textarea th:field="*{symptoms}" class="form-control" rows="2"
                                      placeholder="Mô tả các triệu chứng..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phương pháp điều trị</label>
                            <textarea th:field="*{treatment}" class="form-control" rows="2"
                                      placeholder="Các phương pháp điều trị đã áp dụng..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Đơn thuốc</label>
                            <textarea th:field="*{prescription}" class="form-control" rows="2"
                                      placeholder="Danh sách thuốc và hướng dẫn sử dụng..."></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Cân nặng (kg)</label>
                                    <input type="text" th:field="*{weight}" class="form-control"
                                           placeholder="VD: 5.5"/>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Ghi chú</label>
                            <textarea th:field="*{notes}" class="form-control" rows="2"
                                      placeholder="Các ghi chú bổ sung..."></textarea>
                        </div>

                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="d-flex justify-content-between flex-wrap gap-2">
                            <a th:href="@{/pets/{id}/medical-records(id=${pet.id})}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Quay lại
                            </a>
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-check-lg"></i> Lưu hồ sơ
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
