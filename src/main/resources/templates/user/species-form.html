<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${species?.id != null} ? 'Sửa loài' : 'Thêm loài mới'">Thêm loài</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/nav :: nav ('/my-species')}"></div>

<div class="container py-4" style="margin-bottom: 4rem;">

    <!-- Alert -->
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Page Header -->
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/my-species}" class="btn btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="mb-0" th:text="${species?.id != null} ? 'Sửa loài' : 'Thêm loài mới'">Thêm loài mới</h2>
    </div>

    <!-- Một thẻ: thông tin loài + quản lý giống; Lưu / Hủy ở dưới cùng -->
    <div class="card">
        <div class="card-body">

            <form id="speciesForm" th:action="@{/my-species/save}"
                  th:object="${species}"
                  method="post">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="id" th:value="${species?.id}"/>

                <!-- Tên loài -->
                <div class="mb-3">
                    <label class="form-label">Tên loài *</label>
                    <input type="text" name="name" th:value="${species?.name}" class="form-control" required
                           placeholder="VD: Hamster, Thỏ, Chim..."/>
                </div>

                <!-- Mô tả -->
                <div class="mb-3">
                    <label class="form-label">Mô tả</label>
                    <textarea name="description" th:text="${species?.description}" class="form-control" rows="3"
                              placeholder="Mô tả ngắn về loài..."></textarea>
                </div>

                <!-- Giống sẽ gửi kèm khi thêm loài mới (điền bởi JS) -->
                <div id="breedHiddenContainer" class="d-none" aria-hidden="true"></div>

                <!-- Quản lý giống — cùng khối với form -->
                <div class="border-top pt-4 mt-4">
                    <h5 class="mb-3">
                        <i class="bi bi-list-ul text-primary"></i> Quản lý giống
                    </h5>
                    <p th:if="${species?.id == null}" class="text-muted small mb-3">
                        Thêm giống vào danh sách bên dưới; khi bấm <strong>Lưu</strong>, các giống sẽ được tạo cùng loài mới.
                    </p>
                    <div class="input-group mb-3">
                        <input type="text" id="newBreedName" class="form-control"
                               placeholder="Nhập tên giống mới..."/>
                        <button type="button" class="btn btn-success" id="btnAddBreed">
                            <i class="bi bi-plus-circle"></i> Thêm giống
                        </button>
                    </div>
                    <div id="breedListContainer" class="mb-0"></div>
                </div>

                <!-- Nút hành động — dưới cùng -->
                <div class="d-flex flex-wrap gap-2 pt-4 mt-4 border-top">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle"></i> Lưu
                    </button>
                    <a th:href="@{/my-species}" class="btn btn-secondary">
                        <i class="bi bi-x-circle"></i> Hủy
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
<script th:inline="javascript">
(function() {
    var speciesId = /*[[${species?.id}]]*/ null;
    var isCreateMode = !speciesId;

    var csrfEl = document.querySelector('input[name="_csrf"]');
    var csrfToken = csrfEl ? csrfEl.value : '';
    var csrfParam = csrfEl ? '_csrf=' + encodeURIComponent(csrfToken) : '';

    /** Chế độ thêm loài: danh sách giống tạm trước khi Lưu */
    var pendingBreeds = [];

    function escHtml(s) {
        if (!s) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function renderPendingBreeds() {
        var container = document.getElementById('breedListContainer');
        if (pendingBreeds.length === 0) {
            container.innerHTML =
                '<p class="text-muted text-center mb-0 py-2"><i class="bi bi-inbox"></i> Chưa có giống nào. Thêm giống đầu tiên bên trên.</p>';
            return;
        }
        var html = '<ul class="list-group list-group-flush">';
        pendingBreeds.forEach(function(name, idx) {
            html +=
                '<li class="list-group-item d-flex justify-content-between align-items-center">' +
                    '<span>' + escHtml(name) + '</span>' +
                    '<button type="button" class="btn btn-sm text-danger p-0 border-0" data-pending-idx="' + idx + '" title="Xóa khỏi danh sách">' +
                        '<i class="bi bi-trash"></i> Xóa' +
                    '</button>' +
                '</li>';
        });
        html += '</ul>';
        container.innerHTML = html;
        container.querySelectorAll('[data-pending-idx]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var i = parseInt(btn.getAttribute('data-pending-idx'), 10);
                pendingBreeds.splice(i, 1);
                renderPendingBreeds();
            });
        });
    }

    function loadBreedsFromApi() {
        var container = document.getElementById('breedListContainer');
        container.innerHTML =
            '<div class="text-center py-3"><span class="spinner-border spinner-border-sm text-primary"></span>' +
            '<span class="ms-2 text-muted">Đang tải...</span></div>';
        fetch('/api/user-species/' + speciesId + '/breeds?' + csrfParam, {
            credentials: 'same-origin',
            headers: { 'Accept': 'application/json' }
        }).then(function(r) { return r.json(); })
        .then(function(data) {
            if (!data || data.length === 0) {
                container.innerHTML =
                    '<p class="text-muted text-center mb-0 py-2"><i class="bi bi-inbox"></i> Chưa có giống nào. Thêm giống đầu tiên bên trên.</p>';
                return;
            }
            var html = '<ul class="list-group list-group-flush">';
            data.forEach(function(b) {
                html +=
                    '<li class="list-group-item d-flex justify-content-between align-items-center">' +
                        '<span>' + escHtml(b.name) + '</span>' +
                        '<button type="button" class="btn btn-sm text-danger p-0 border-0" data-breed-id="' + b.id + '" title="Xóa giống">' +
                            '<i class="bi bi-trash"></i> Xóa' +
                        '</button>' +
                    '</li>';
            });
            html += '</ul>';
            container.innerHTML = html;
            container.querySelectorAll('[data-breed-id]').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    deleteBreedApi(parseInt(btn.getAttribute('data-breed-id'), 10));
                });
            });
        })
        .catch(function() {
            container.innerHTML = '<p class="text-danger text-center mb-0 py-2">Lỗi tải danh sách giống</p>';
        });
    }

    function deleteBreedApi(breedId) {
        if (!confirm('Xóa giống này?')) return;
        fetch('/api/user-species/' + speciesId + '/breeds/' + breedId + '?' + csrfParam, {
            method: 'DELETE',
            credentials: 'same-origin',
            headers: { 'Accept': 'application/json' }
        }).then(function(r) {
            if (r.ok) loadBreedsFromApi();
        });
    }

    function addBreedApi() {
        var nameInput = document.getElementById('newBreedName');
        var name = nameInput.value.trim();
        if (!name) return;
        fetch('/api/user-species/' + speciesId + '/breeds?' + csrfParam, {
            method: 'POST',
            credentials: 'same-origin',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'Accept': 'application/json'
            },
            body: 'name=' + encodeURIComponent(name) + '&' + csrfParam
        }).then(function(r) {
            if (!r.ok) throw new Error(r.status);
            return r.json();
        }).then(function() {
            nameInput.value = '';
            loadBreedsFromApi();
        }).catch(function() {
            alert('Lỗi khi thêm giống!');
        });
    }

    function addBreedPending() {
        var nameInput = document.getElementById('newBreedName');
        var name = nameInput.value.trim();
        if (!name) return;
        var lower = name.toLowerCase();
        if (pendingBreeds.some(function(x) { return x.toLowerCase() === lower; })) {
            alert('Giống này đã có trong danh sách.');
            return;
        }
        pendingBreeds.push(name);
        nameInput.value = '';
        renderPendingBreeds();
    }

    document.getElementById('btnAddBreed').addEventListener('click', function() {
        if (isCreateMode) {
            addBreedPending();
        } else {
            addBreedApi();
        }
    });

    document.getElementById('newBreedName').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            if (isCreateMode) addBreedPending();
            else addBreedApi();
        }
    });

    document.getElementById('speciesForm').addEventListener('submit', function() {
        if (!isCreateMode) return;
        var c = document.getElementById('breedHiddenContainer');
        c.innerHTML = '';
        pendingBreeds.forEach(function(name) {
            var inp = document.createElement('input');
            inp.type = 'hidden';
            inp.name = 'breedNames';
            inp.value = name;
            c.appendChild(inp);
        });
    });

    if (isCreateMode) {
        renderPendingBreeds();
    } else {
        loadBreedsFromApi();
    }
})();
</script>
</body>
</html>
