<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Quản lý người dùng - Pet Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{admin/fragments/header :: navbar('users')}"></nav>
<script th:src="@{/js/same-page-nav-guard.js}"></script>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-people"></i> Quản lý người dùng</h2>
        <a th:href="@{/admin/users/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Thêm người dùng
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}">Thành công</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Tìm kiếm -->
    <form th:action="@{/admin/users}" method="get" class="row g-3 mb-4">
        <div class="col-md-6">
            <div class="input-group">
                <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Tìm theo tên..."/>
                <button type="submit" class="btn btn-outline-primary"><i class="bi bi-search"></i> Tìm</button>
                <a th:href="@{/admin/users}" class="btn btn-outline-secondary">Xóa</a>
            </div>
        </div>
    </form>

    <!-- Bảng danh sách -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Tên đăng nhập</th>
                            <th>Họ tên</th>
                            <th>Email</th>
                            <th>Điện thoại</th>
                            <th>Vai trò</th>
                            <th>Trạng thái</th>
                            <th>Ngày tạo</th>
                            <th class="text-center">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${users}">
                            <td th:text="${u.id}">1</td>
                            <td><strong th:text="${u.username}">username</strong></td>
                            <td th:text="${u.fullName}">Họ tên</td>
                            <td th:text="${u.email}">email</td>
                            <td th:text="${u.phone != null ? u.phone : '-'}">ĐT</td>
                            <td>
                                <span th:each="r, iter : ${u.roles}" class="badge bg-primary me-1"
                                      th:text="${#strings.replace(r.name.name(), 'ROLE_', '')}">ROLE</span>
                            </td>
                            <td>
                                <span class="badge" th:classappend="${u.enabled} ? 'bg-success' : 'bg-danger'"
                                      th:text="${u.enabled} ? 'Hoạt động' : 'Bị khóa'">Trạng thái</span>
                            </td>
                            <td th:text="${#temporals.format(u.createdAt, 'dd/MM/yyyy')}">Ngày</td>
                            <td class="text-center">
                                <!-- Reset mật khẩu -->
                                <form th:action="@{/admin/users/{id}/reset-password(id=${u.id})}" method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-warning"
                                            onclick="return confirm('Reset mật khẩu về 123456?')"
                                            title="Reset mật khẩu">
                                        <i class="bi bi-key"></i>
                                    </button>
                                </form>
                                <!-- Khóa/Mở khóa -->
                                <form th:action="@{/admin/users/{id}/toggle-status(id=${u.id})}" method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm"
                                            th:classappend="${u.enabled} ? 'btn-secondary' : 'btn-success'"
                                            th:title="${u.enabled} ? 'Khóa tài khoản' : 'Mở khóa tài khoản'">
                                        <i th:classappend="${u.enabled} ? 'bi bi-lock' : 'bi bi-unlock'"></i>
                                    </button>
                                </form>
                                <!-- Sửa -->
                                <a th:href="@{/admin/users/{id}/edit(id=${u.id})}" class="btn btn-sm btn-info" title="Sửa">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <!-- Xóa -->
                                <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post" class="d-inline"
                                      onsubmit="return confirm('Xóa người dùng này?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-danger" title="Xóa">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="9" class="text-center text-muted py-4">Không có người dùng nào</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Phân trang -->
    <nav th:if="${totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/users(keyword=${keyword}, page=${currentPage - 1})}">Trước</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/admin/users(keyword=${keyword}, page=${i})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/users(keyword=${keyword}, page=${currentPage + 1})}">Sau</a>
            </li>
        </ul>
    </nav>

    <div class="mt-4">
        <a th:href="@{/admin}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Quay lại Dashboard</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
