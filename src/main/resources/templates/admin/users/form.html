<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${user.id != null} ? 'Sửa người dùng' : 'Thêm người dùng'">Người dùng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{admin/fragments/header :: navbar('users')}"></nav>
<script th:src="@{/js/same-page-nav-guard.js}"></script>

<div class="container py-4">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/admin}">Dashboard</a></li>
            <li class="breadcrumb-item"><a th:href="@{/admin/users}">Người dùng</a></li>
            <li class="breadcrumb-item active" th:text="${user.id != null} ? 'Sửa' : 'Thêm'">Form</li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-person-plus"></i> <span th:text="${user.id != null} ? 'Sửa người dùng' : 'Thêm người dùng mới'">Form</span></h4>
                </div>
                <div class="card-body">
                    <form th:action="${user.id != null} ? @{/admin/users/{id}(id=${user.id})} : @{/admin/users}"
                          th:object="${user}" method="post">

                        <!-- Thông tin đăng nhập -->
                        <h5 class="mb-3 border-bottom pb-2"><i class="bi bi-shield-lock"></i> Thông tin đăng nhập</h5>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Tên đăng nhập *</label>
                                <input type="text" th:field="*{username}" class="form-control"
                                       required th:readonly="${user.id != null}"
                                       placeholder="Không dấu, không khoảng trắng"/>
                                <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-danger small"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label" th:text="${user.id != null} ? 'Mật khẩu mới (bỏ trống nếu không đổi)' : 'Mật khẩu *'">Mật khẩu</label>
                                <input type="password" name="newPassword" class="form-control"
                                       th:required="${user.id == null}"/>
                                <div class="form-text" th:if="${user.id != null}">Bỏ trống = giữ nguyên mật khẩu cũ. Mặc định: 123456</div>
                            </div>
                        </div>

                        <!-- Thông tin cá nhân -->
                        <h5 class="mb-3 border-bottom pb-2"><i class="bi bi-person"></i> Thông tin cá nhân</h5>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Họ tên *</label>
                                <input type="text" th:field="*{fullName}" class="form-control" required/>
                                <div th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="text-danger small"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email *</label>
                                <input type="email" th:field="*{email}" class="form-control" required/>
                                <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger small"></div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Số điện thoại</label>
                                <input type="text" th:field="*{phone}" class="form-control"/>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Địa chỉ</label>
                                <input type="text" th:field="*{address}" class="form-control"/>
                            </div>
                        </div>

                        <!-- Vai trò -->
                        <h5 class="mb-3 border-bottom pb-2"><i class="bi bi-tags"></i> Vai trò</h5>
                        <div class="mb-3">
                            <label class="form-label">Chọn vai trò</label>
                            <div class="row">
                                <div class="col-md-4" th:each="roleType : ${roleTypes}">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="selectedRoles"
                                               th:value="${roleType.name()}"
                                               th:id="|role-cb-${roleType.name()}|"
                                               th:checked="${selectedRoleNames != null and #lists.contains(selectedRoleNames, roleType.name())}"/>
                                        <label class="form-check-label" th:for="|role-cb-${roleType.name()}|"
                                               th:text="${#strings.replace(roleType.name(), 'ROLE_', '')}">ROLE</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Trạng thái (chỉ khi sửa) -->
                        <div class="mb-3" th:if="${user.id != null}">
                            <label class="form-label">Trạng thái tài khoản</label>
                            <select th:field="*{enabled}" class="form-select">
                                <option th:value="true">Hoạt động</option>
                                <option th:value="false">Bị khóa</option>
                            </select>
                        </div>

                        <input type="hidden" th:field="*{id}" th:if="${user.id != null}"/>
                        <input type="hidden" th:field="*{password}" th:if="${user.id != null}"/>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a th:href="@{/admin/users}" class="btn btn-secondary me-md-2">
                                <i class="bi bi-x-lg"></i> Hủy
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> Lưu
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
