<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Quản trị - Pet Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{admin/fragments/header :: navbar('dashboard')}"></nav>

<div class="container py-4">
    <h2 class="mb-4"><i class="bi bi-speedometer2"></i> Dashboard Quản trị</h2>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}">Thành công</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}">Lỗi</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Thống kê -->
    <div class="row g-4 mb-4">
        <div class="col-6 col-lg-3">
            <div class="card border-primary h-100">
                <div class="card-body text-center">
                    <i class="bi bi-people display-4 text-primary"></i>
                    <h3 class="mt-2 mb-0" th:text="${totalUsers}">0</h3>
                    <p class="text-muted mb-0 small">Tổng người dùng</p>
                </div>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="card border-success h-100">
                <div class="card-body text-center">
                    <i class="bi bi-person-check display-4 text-success"></i>
                    <h3 class="mt-2 mb-0" th:text="${activeUsers}">0</h3>
                    <p class="text-muted mb-0 small">Đang hoạt động</p>
                </div>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <a th:href="@{/admin/doctors}" class="text-decoration-none text-reset">
                <div class="card border-info h-100">
                    <div class="card-body text-center">
                        <i class="bi bi-heart-pulse display-4 text-info"></i>
                        <h3 class="mt-2 mb-0" th:text="${officialVetsCount}">0</h3>
                        <p class="text-muted mb-0 small">Bác sĩ chính thức</p>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-6 col-lg-3">
            <a th:href="@{/admin/doctors}" class="text-decoration-none text-reset">
                <div class="card border-warning h-100">
                    <div class="card-body text-center">
                        <i class="bi bi-hourglass-split display-4 text-warning"></i>
                        <h3 class="mt-2 mb-0" th:text="${pendingVetsCount}">0</h3>
                        <p class="text-muted mb-0 small">Bác sĩ chờ duyệt</p>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <!-- Thao tác nhanh -->
    <h4 class="mb-3">Thao tác nhanh</h4>
    <div class="row g-3">
        <div class="col-md-6 col-lg-4">
            <a th:href="@{/admin/users}" class="btn btn-primary w-100 py-3">
                <i class="bi bi-people-fill"></i><br/>
                <span>Quản lý người dùng</span>
            </a>
        </div>
        <div class="col-md-6 col-lg-4">
            <a th:href="@{/admin/users/new}" class="btn btn-success w-100 py-3">
                <i class="bi bi-person-plus"></i><br/>
                <span>Thêm người dùng</span>
            </a>
        </div>
        <div class="col-md-6 col-lg-4">
            <button type="button" class="btn btn-success w-100 py-3"
                    data-bs-toggle="modal" data-bs-target="#addVetModalDashboard">
                <i class="bi bi-heart-pulse"></i><br/>
                <span>Thêm bác sĩ</span>
            </button>
        </div>
    </div>
</div>

<!-- Modal Thêm bác sĩ (cùng endpoint /admin/doctors/add, quay về dashboard) -->
<div class="modal fade" id="addVetModalDashboard" tabindex="-1" aria-labelledby="addVetModalDashboardLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form th:action="@{/admin/doctors/add}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title" id="addVetModalDashboardLabel">
                        <i class="bi bi-plus-circle"></i> Thêm bác sĩ
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="returnTo" value="dashboard"/>
                    <div class="mb-3">
                        <label for="dashboardUsernameOrEmail" class="form-label">
                            Tài khoản hoặc Email <span class="text-danger">*</span>
                        </label>
                        <input type="text" id="dashboardUsernameOrEmail" name="usernameOrEmail"
                               class="form-control"
                               placeholder="Nhập tên đăng nhập hoặc email"
                               required/>
                        <div class="form-text">
                            Nhập <strong>tên đăng nhập</strong> (tài khoản thường) hoặc <strong>email</strong> (tài khoản Google).
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-plus-lg"></i> Thêm bác sĩ
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
