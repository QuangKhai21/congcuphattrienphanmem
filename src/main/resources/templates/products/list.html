<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Sản phẩm - Pet Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/nav :: nav ('/products')}"></div>

<div class="container py-4">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}">Thành công</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h2><i class="bi bi-box-seam"></i> Sản phẩm</h2>
        <a th:href="@{/products/admin/new}" class="btn btn-primary" sec:authorize="hasRole('ADMIN')"><i class="bi bi-plus-lg"></i> Thêm sản phẩm</a>
    </div>
    <form th:action="@{/products}" method="get" class="row g-3 mb-4">
        <div class="col-md-4">
            <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Tìm sản phẩm..."/>
        </div>
        <div class="col-md-4">
            <select name="categoryId" class="form-select" onchange="this.form.submit()">
                <option value="">Tất cả danh mục</option>
                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}" th:selected="${selectedCategoryId != null and selectedCategoryId == c.id}">Danh mục</option>
            </select>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-outline-primary w-100">Tìm</button>
        </div>
    </form>

    <div class="row g-4">
        <div class="col-sm-6 col-md-4 col-lg-3" th:each="p : ${products}">
            <div class="card h-100 shadow-sm">
                <div class="card-img-top bg-light d-flex align-items-center justify-content-center" style="height: 180px;">
                    <i class="bi bi-box-seam display-4 text-muted" th:if="${p.imageUrl == null}"></i>
                    <img th:if="${p.imageUrl != null}" th:src="${p.imageUrl}" alt="Product" class="img-fluid" style="max-height: 180px; object-fit: contain;"/>
                </div>
                <div class="card-body d-flex flex-column">
                    <h6 class="card-title text-truncate" th:text="${p.name}">Tên</h6>
                    <p class="text-primary fw-bold mb-2">
                        <span th:text="${#numbers.formatDecimal(p.salePrice != null ? p.salePrice : p.price, 0, 'COMMA', 0, 'POINT')}"></span> đ
                        <span class="text-decoration-line-through text-muted small" th:if="${p.salePrice != null}" th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT') + ' đ'}"></span>
                    </p>
                    <a th:href="@{/products/{id}(id=${p.id})}" class="btn btn-outline-primary btn-sm mt-auto">Xem chi tiết</a>
                </div>
            </div>
        </div>
        <div class="col-12" th:if="${#lists.isEmpty(products)}">
            <p class="text-center text-muted py-5">Không có sản phẩm nào</p>
        </div>
    </div>

    <nav th:if="${totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/products(keyword=${keyword}, categoryId=${selectedCategoryId}, page=${currentPage - 1})}">Trước</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/products(keyword=${keyword}, categoryId=${selectedCategoryId}, page=${i})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/products(keyword=${keyword}, categoryId=${selectedCategoryId}, page=${currentPage + 1})}">Sau</a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
