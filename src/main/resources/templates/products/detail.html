<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${product.name}">Chi tiết sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/nav :: nav ('/products')}"></div>

<div class="container py-4">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}">Thành công</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/products}">Sản phẩm</a></li>
            <li class="breadcrumb-item active" th:text="${product.name}">Chi tiết</li>
        </ol>
    </nav>
    <div class="row">
        <div class="col-md-5">
            <div class="card bg-light" style="height: 350px;">
                <div class="card-body d-flex align-items-center justify-content-center">
                    <i class="bi bi-box-seam display-1 text-muted" th:if="${product.imageUrl == null}"></i>
                    <img th:if="${product.imageUrl != null}" th:src="${product.imageUrl}" alt="Product" class="img-fluid" style="max-height: 330px;"/>
                </div>
            </div>
        </div>
        <div class="col-md-7">
            <h2 th:text="${product.name}">Tên sản phẩm</h2>
            <p class="text-muted" th:text="'SKU: ' + ${product.sku}">SKU</p>
            <p class="text-primary fs-4 fw-bold">
                <span th:text="${#numbers.formatDecimal(product.salePrice != null ? product.salePrice : product.price, 0, 'COMMA', 0, 'POINT')}"></span> đ
                <span class="text-decoration-line-through text-muted fs-6" th:if="${product.salePrice != null}" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT') + ' đ'}"></span>
            </p>
            <p th:if="${product.description}" th:utext="${product.description}">Mô tả</p>
            <p><span class="fw-bold">Tồn kho:</span> <span th:text="${product.stockQuantity}">0</span> <span th:text="${product.unit}">đơn vị</span></p>
            <a th:href="@{/products/admin/{id}/edit(id=${product.id})}" class="btn btn-warning" sec:authorize="hasRole('ADMIN')"><i class="bi bi-pencil"></i> Sửa</a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
