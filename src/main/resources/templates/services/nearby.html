<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::title}, ~{::#page-content}, ~{::#page-scripts})}">
<head>
    <title>Tìm dịch vụ gần bạn - Pet Clinic</title>
</head>
<body>
<div id="page-content" th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-geo-alt-fill"></i> Dịch vụ thú cưng gần nhất</h2>
        <button type="button" onclick="getLocation()" class="btn btn-primary">
            <i class="bi bi-crosshair"></i> Vị trí của tôi
        </button>
    </div>

    <div class="card mb-3">
        <div class="card-body py-2">
            <div class="d-flex gap-2 flex-wrap">
                <a th:href="@{/services/nearby(lat=${centerLat},lng=${centerLng},radius=${radius})}"
                   class="btn btn-outline-secondary btn-sm" th:classappend="${selectedType == null} ? 'active'">
                    <i class="bi bi-grid"></i> Tất cả
                </a>
                <a th:href="@{/services/nearby(lat=${centerLat},lng=${centerLng},type=PET_TAXI,radius=${radius})}"
                   class="btn btn-outline-primary btn-sm" th:classappend="${selectedType != null and selectedType.name() == 'PET_TAXI'} ? 'active'">
                    <i class="bi bi-truck"></i> Pet Taxi
                </a>
                <a th:href="@{/services/nearby(lat=${centerLat},lng=${centerLng},type=PET_SHOP,radius=${radius})}"
                   class="btn btn-outline-success btn-sm" th:classappend="${selectedType != null and selectedType.name() == 'PET_SHOP'} ? 'active'">
                    <i class="bi bi-bag"></i> Pet Shop
                </a>
                <a th:href="@{/services/nearby(lat=${centerLat},lng=${centerLng},type=SPA,radius=${radius})}"
                   class="btn btn-outline-danger btn-sm" th:classappend="${selectedType != null and selectedType.name() == 'SPA'} ? 'active'">
                    <i class="bi bi-droplet"></i> Spa
                </a>
                <a th:href="@{/services/nearby(lat=${centerLat},lng=${centerLng},type=HOTEL,radius=${radius})}"
                   class="btn btn-outline-warning btn-sm" th:classappend="${selectedType != null and selectedType.name() == 'HOTEL'} ? 'active'">
                    <i class="bi bi-building"></i> Khách sạn
                </a>
                <a th:href="@{/services/24h(lat=${centerLat},lng=${centerLng},radius=${radius})}"
                   class="btn btn-outline-dark btn-sm" th:classappend="${is24h} ? 'active'">
                    <i class="bi bi-clock"></i> 24/7
                </a>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body p-0">
                    <div id="map"></div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card" id="serviceList">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-list-ul"></i> Kết quả (<span th:text="${services.size()}">0</span>)</span>
                    <div class="input-group input-group-sm" style="width: 120px;">
                        <span class="input-group-text">Bán kính</span>
                        <select class="form-select" id="radiusSelect" onchange="changeRadius(this.value)">
                            <option value="1" th:selected="${radius == 1}">1 km</option>
                            <option value="5" th:selected="${radius == 5}">5 km</option>
                            <option value="10" th:selected="${radius == 10}">10 km</option>
                            <option value="20" th:selected="${radius == 20}">20 km</option>
                        </select>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="list-group list-group-flush">
                        <div th:each="service : ${services}"
                             class="list-group-item service-card"
                             th:attr="data-id=${service.id}, data-lat=${service.lat}, data-lng=${service.lng}"
                             onclick="focusService(this)">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <strong th:text="${service.name}">Tên dịch vụ</strong>
                                    <br>
                                    <small class="text-muted">
                                        <span class="badge bg-secondary type-badge" th:text="${service.serviceType.name().replace('_', ' ')}">Loại</span>
                                        <span class="badge bg-success type-badge" th:if="${service.is24h}">24/7</span>
                                        <span th:if="${service.distance}">
                                            <i class="bi bi-signpost text-primary"></i> <span th:text="${#numbers.formatDecimal(service.distance, 1, 1)}">0.0</span> km
                                        </span>
                                    </small>
                                </div>
                                <div class="text-end">
                                    <a th:if="${service.phone}" th:href="@{'tel:' + ${service.phone}}"
                                       class="btn btn-success btn-sm" onclick="event.stopPropagation()">
                                        <i class="bi bi-telephone"></i>
                                    </a>
                                    <div th:if="${service.rating}" class="mt-1">
                                        <i class="bi bi-star-fill text-warning"></i>
                                        <small th:text="${service.rating}">5.0</small>
                                    </div>
                                </div>
                            </div>
                            <small class="text-muted" th:text="${service.address}">Địa chỉ</small>
                        </div>
                    </div>

                    <div class="p-3 text-center" th:if="${hasLocation == false}">
                        <div class="text-muted">
                            <i class="bi bi-crosshair fs-1"></i>
                            <p class="mb-2">Nhấn "Vị trí của tôi" để xem dịch vụ gần bạn</p>
                        </div>
                    </div>

                    <div class="p-3 text-center text-muted" th:if="${services.isEmpty() and hasLocation == true}">
                        <i class="bi bi-emoji-frown fs-1"></i>
                        <p class="mb-0">Không có dịch vụ trong bán kính này</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block id="page-scripts" th:fragment="page-scripts">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <style>
        #map { height: 600px; width: 100%; }
        .service-card { cursor: pointer; transition: all 0.2s; }
        .service-card:hover { background-color: #f8f9fa; }
        .service-card.active { border: 2px solid #0d6efd; }
        .type-badge { font-size: 11px; padding: 3px 8px; }
        #serviceList { max-height: 550px; overflow-y: auto; }
    </style>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script th:inline="javascript">
    /*<![CDATA[*/
    let map;
    let serviceMarkers = [];
    let userMarker;
    let currentPopup = null;

    const centerLat = /*[[${centerLat}]]*/ 10.8231;
    const centerLng = /*[[${centerLng}]]*/ 106.6297;
    const radius = /*[[${radius}]]*/ 10;
    const selectedType = /*[[${selectedType}]]*/ null;
    const hasLocation = /*[[${hasLocation}]]*/ false;
    const services = /*[[${services}]]*/ [];

    const serviceTypeIcons = {
        'PET_TAXI': 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
        'PET_SHOP': 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
        'SPA': 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
        'HOTEL': 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-yellow.png',
        'VET_CLINIC': 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-violet.png',
        'TRAINING': 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-orange.png'
    };

    function initMap() {
        const el = document.getElementById('map');
        if (!el) return;
        const center = (hasLocation && centerLat && centerLng)
            ? [centerLat, centerLng]
            : [10.8231, 106.6297];
        map = L.map('map').setView(center, 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        if (hasLocation && centerLat && centerLng) {
            const userIcon = L.icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
                iconSize: [25, 41], iconAnchor: [12, 41]
            });
            userMarker = L.marker([centerLat, centerLng], { icon: userIcon })
                .addTo(map).bindPopup('Vị trí của bạn');
            L.circle([centerLat, centerLng], {
                color: '#0d6efd', fillOpacity: 0.1, weight: 2, opacity: 0.3,
                radius: radius * 1000
            }).addTo(map);
        }

        services.forEach(service => {
            if (service.lat && service.lng) {
                addServiceMarker(service);
            }
        });
        requestAnimationFrame(() => map.invalidateSize());
        setTimeout(() => map.invalidateSize(), 200);
    }

    function addServiceMarker(service) {
        const iconUrl = serviceTypeIcons[service.serviceType] || serviceTypeIcons['PET_SHOP'];
        const icon = L.icon({
            iconUrl: iconUrl,
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34]
        });
        const marker = L.marker([service.lat, service.lng], { icon: icon })
            .addTo(map)
            .bindPopup(`
                <div style="min-width: 200px;">
                    <h6 style="margin: 0 0 5px;">${service.name}</h6>
                    <p style="margin: 0 0 5px; font-size: 12px; color: #666;">
                        <i class="bi bi-geo-alt"></i> ${service.address || 'Chưa có địa chỉ'}
                    </p>
                    ${service.phone ? '<p style="margin: 0; font-size: 12px;"><i class="bi bi-telephone"></i> <a href="tel:' + service.phone + '">' + service.phone + '</a></p>' : ''}
                    ${service.is24h ? '<span class="badge bg-success mt-1">24/7</span>' : ''}
                    <br><a href="/services/detail/${service.id}" class="btn btn-sm btn-primary mt-2">Chi tiết</a>
                </div>
            `);
        marker.on('click', () => { highlightServiceCard(service.id); });
        serviceMarkers.push({ id: service.id, marker: marker });
    }

    function getLocation() {
        if (!navigator.geolocation) {
            alert('Trình duyệt không hỗ trợ định vị.');
            return;
        }
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const typeParam = selectedType ? '&type=' + selectedType : '';
                window.location.href = '/services/nearby?lat=' + lat + '&lng=' + lng + '&radius=' + radius + typeParam;
            },
            (err) => {
                let msg = 'Không thể lấy vị trí. ';
                if (err && err.code === 1) {
                    msg += 'Cho phép Vị trí cho trang này (biểu tượng khóa cạnh địa chỉ).';
                } else if (err && err.code === 3) {
                    msg += 'Hết thời gian chờ — bật GPS và thử lại.';
                } else {
                    msg += 'Bật GPS và cấp quyền định vị.';
                }
                alert(msg);
            },
            { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
        );
    }

    function changeRadius(newRadius) {
        const typeParam = selectedType ? '&type=' + selectedType : '';
        window.location.href = `/services/nearby?lat=${centerLat}&lng=${centerLng}&radius=${newRadius}${typeParam}`;
    }

    function focusService(el) {
        if (!map) return;
        const id = el.dataset.id;
        const lat = parseFloat(el.dataset.lat);
        const lng = parseFloat(el.dataset.lng);
        map.setView([lat, lng], 16);
        const found = serviceMarkers.find(s => s.id == id);
        if (found) found.marker.openPopup();
    }

    function highlightServiceCard(id) {
        document.querySelectorAll('.service-card').forEach(el => el.classList.remove('active'));
        const card = document.querySelector(`.service-card[data-id="${id}"]`);
        if (card) {
            card.classList.add('active');
            card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    }

    window.addEventListener('DOMContentLoaded', initMap);
    /*]]>*/
    </script>
</th:block>
</body>
</html>
